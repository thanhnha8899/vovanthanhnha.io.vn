<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKKN Dan y rieng</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #f3f6fb; color: #0f172a; }
    .wrap { max-width: 900px; margin: 24px auto; padding: 20px; }
    .card { background: #fff; border: 1px solid #dbe3ef; border-radius: 16px; padding: 20px; }
    h1 { margin: 0 0 6px; color: #0b7fa5; }
    .sub { margin: 0 0 16px; color: #64748b; }
    .row { margin-bottom: 12px; }
    label { font-size: 14px; font-weight: 600; display: block; margin-bottom: 6px; }
    input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px 12px; font-size: 14px; }
    textarea { min-height: 120px; resize: vertical; }
    .actions { margin-top: 16px; display: flex; gap: 10px; }
    button, a.btn { border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; text-decoration: none; cursor: pointer; }
    .primary { background: #0891b2; color: #fff; }
    .ghost { background: #e2e8f0; color: #0f172a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>SKKN Dan y rieng</h1>
      <p class="sub">Tu tao va chinh sua dan y, sau do yeu cau AI viet theo tung muc.</p>
      <div class="row">
        <label for="title">Ten de tai</label>
        <input id="title" />
      </div>
      <div class="row">
        <label for="objective">Muc tieu tai lieu</label>
        <textarea id="objective"></textarea>
      </div>
      <div class="row">
        <label for="outline">Dan y dang cay (chuong/muc/tieu muc)</label>
        <textarea id="outline" placeholder="Chuong 1: ...&#10;  Muc 1.1: ...&#10;  Muc 1.2: ..."></textarea>
      </div>
      <div class="actions">
        <button class="primary" type="button">Luu va tao noi dung</button>
        <a class="btn ghost" href="index.html">Quay lai</a>
      </div>
    </div>
  </div>
</body>
</html>
